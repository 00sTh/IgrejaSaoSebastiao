services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - DATABASE_URL=postgres://igreja:igreja@db:5432/igreja_db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=igreja_db
      - POSTGRES_USER=igreja
      - POSTGRES_PASSWORD=igreja
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U igreja -d igreja_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  media_data:
