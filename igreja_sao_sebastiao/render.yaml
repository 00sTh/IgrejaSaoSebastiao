services:
  - type: web
    name: igreja-sao-sebastiao
    runtime: python
    buildCommand: pip install -e . && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: igreja-db
          property: connectionString

databases:
  - name: igreja-db
    plan: free
    databaseName: igreja_db
    user: igreja
