<!-- GALLERY SECTION -->
<section id="galeria" class="gallery-section section-padding bg-light" aria-label="Galeria de fotos">
    <div class="container">
        <h2>{{ info_paroquia.galeria_titulo.titulo|default:"Nossa Igreja em Imagens" }}</h2>
        <div class="gallery-grid">
            {% for foto in galeria %}
            <img src="{% if foto.imagem_medium %}{{ foto.imagem_medium.url }}{% else %}{{ foto.imagem.url }}{% endif %}"
                 alt="{{ foto.titulo }}"
                 class="gallery-item"
                 title="{{ foto.titulo }}"
                 loading="lazy">
            {% empty %}
            <p style="text-align: center; grid-column: 1/-1; color: #666;">
                Nenhuma imagem na galeria ainda.
            </p>
            {% endfor %}
        </div>
    </div>
</section>
